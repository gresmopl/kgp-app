<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Korona Gór Polski</title>
<style>
/* Bezpieczny fallback fontów — działa bez internetu i z file:// */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --card: #1e1e35;
  --card2: #252545;
  --accent: #e8a020;
  --accent2: #f0c060;
  --green: #4caf7d;
  --red: #e05555;
  --blue: #4a90d9;
  --text: #e8e8f0;
  --text2: #9090b0;
  --border: #2a2a45;
  --radius: 14px;
  --tab-h: 64px;
  --font-display: 'Bebas Neue', 'Arial Black', 'Impact', system-ui, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#screen { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; }
#screen::-webkit-scrollbar { display: none; }

/* HEADER */
.header { 
  background: var(--bg2); padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-icon { font-size: 22px; }
.header-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1.5px; color: var(--accent); flex: 1; }
.header-sub { font-size: 11px; color: var(--text2); margin-top: -2px; }
.header-badge { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

/* BOTTOM NAV */
#nav {
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bottom);
  height: calc(var(--tab-h) + var(--safe-bottom));
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: none; border: none; color: var(--text2);
  font-size: 10px; font-family: var(--font-body); cursor: pointer;
  padding: 8px 4px; transition: color 0.2s; min-height: 44px;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }

/* CARDS */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.card-pad { padding: 14px; }
.section-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--accent2); margin-bottom: 12px; }

/* BUTTONS */
.btn { 
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer;
  font-family: var(--font-body); font-weight: 600; font-size: 14px;
  transition: all 0.15s; min-height: 44px;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:active { transform: scale(0.97); background: var(--accent2); }
.btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:active { transform: scale(0.97); }
.btn-green { background: var(--green); color: #fff; }
.btn-sm { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* PEAK LIST */
.peak-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background 0.15s; min-height: 60px;
}
.peak-item:last-child { border-bottom: none; }
.peak-item:active { background: var(--card2); }
.peak-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.peak-dot.done { background: var(--green); box-shadow: 0 0 8px var(--green)44; }
.peak-dot.todo { background: var(--text2); }
.peak-info { flex: 1; min-width: 0; }
.peak-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.peak-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.peak-height { font-family: var(--font-display); font-size: 18px; color: var(--accent); letter-spacing: 0.5px; flex-shrink: 0; }
.peak-diff { display: flex; gap: 2px; }
.diff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.diff-dot.filled { background: var(--accent); }

/* PROGRESS */
.progress-bar { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s ease; }

/* MAP */
#map-container { height: calc(100dvh - var(--tab-h) - var(--safe-bottom) - 52px); position:relative; overflow:hidden; background:#0d1117; }
#map-svg { width:100%; height:100%; cursor:grab; touch-action:none; }
.map-controls { position:absolute; bottom:16px; right:12px; display:flex; flex-direction:column; gap:8px; z-index:5; }
.map-btn { width:40px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text); }
.map-tooltip { position:absolute; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; pointer-events:none; z-index:10; min-width:150px; display:none; box-shadow:0 4px 20px #0006; }
.map-legend { position:absolute; bottom:16px; left:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 10px; font-size:11px; z-index:5; }
.map-legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.map-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* WEATHER */
.weather-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.weather-day { 
  background: var(--card2); border-radius: 8px; padding: 6px 4px;
  text-align: center; border: 1px solid var(--border);
}
.weather-day.good { border-color: var(--green)88; background: #1e352a; }
.weather-day.risky { border-color: var(--accent)88; background: #352a1a; }
.weather-day.bad { border-color: var(--red)88; background: #351a1a; }
.weather-date { font-size: 9px; color: var(--text2); }
.weather-icon { font-size: 18px; margin: 3px 0; }
.weather-score { font-size: 8px; font-weight: 700; }
.weather-score.good { color: var(--green); }
.weather-score.risky { color: var(--accent); }
.weather-score.bad { color: var(--red); }

/* TIMELINE */
.timeline { position: relative; }
.tl-item { display: flex; gap: 12px; padding-bottom: 16px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-left { display: flex; flex-direction: column; align-items: center; width: 36px; flex-shrink: 0; }
.tl-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.tl-line { flex: 1; width: 2px; background: var(--border); margin-top: 4px; }
.tl-content { flex: 1; padding-top: 6px; }
.tl-time { font-family: var(--font-display); font-size: 20px; color: var(--accent); letter-spacing: 1px; }
.tl-label { font-size: 13px; font-weight: 500; }
.tl-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* STAMP */
.stamp-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stamp-item:last-child { border-bottom: none; }
.stamp-icon-wrap { width: 38px; height: 38px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.stamp-info { flex: 1; }
.stamp-name { font-weight: 600; font-size: 13px; }
.stamp-note { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stamp-dist { font-size: 11px; color: var(--accent); font-weight: 600; }

/* SUMMIT MODE */
.summit-header { 
  background: linear-gradient(135deg, #1a2a1a, #0f1a0f);
  border: 1px solid var(--green)44; border-radius: var(--radius);
  padding: 20px; text-align: center; margin-bottom: 14px;
}
.summit-peak-name { font-family: var(--font-display); font-size: 36px; color: var(--green); letter-spacing: 2px; }
.summit-height { font-size: 14px; color: var(--text2); }

/* JOURNAL */
.journal-item { display: flex; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--border); align-items: center; }
.journal-photo { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.journal-photo img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
.journal-info { flex: 1; }
.journal-name { font-weight: 600; font-size: 14px; }
.journal-date { font-size: 11px; color: var(--text2); margin-top: 2px; }
.journal-note { font-size: 11px; color: var(--text2); margin-top: 3px; font-style: italic; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(--card2); border-radius: 12px; padding: 14px; border: 1px solid var(--border); text-align: center; }
.stat-val { font-family: var(--font-display); font-size: 28px; color: var(--accent); letter-spacing: 1px; }
.stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* FILTER CHIPS */
.chips { display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 12px; }
.chips::-webkit-scrollbar { display: none; }
.chip { 
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; color: var(--text2); transition: all 0.15s; min-height: 32px;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

/* MODAL/DETAIL */
.modal-overlay { position: fixed; inset: 0; background: #000a; z-index: 200; display: flex; align-items: flex-end; }
.modal-sheet { 
  background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%;
  max-height: 90dvh; overflow-y: auto; padding: 0 0 calc(20px + var(--safe-bottom));
  border-top: 1px solid var(--border);
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
.modal-header { padding: 0 16px 12px; border-bottom: 1px solid var(--border); }

/* GPS indicator */
.gps-pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

/* CONFETTI */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 3s ease-in forwards; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100dvh) rotate(720deg);opacity:0} }

/* INPUT */
.input { 
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--font-body); font-size: 14px;
  padding: 12px 14px; width: 100%; outline: none;
}
.input:focus { border-color: var(--accent)88; }
select.input { appearance: none; }
.label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }

/* DIFFICULTY badge */
.diff-badge { 
  display: inline-flex; align-items: center; gap: 2px;
  background: var(--card2); border-radius: 6px; padding: 2px 6px;
}

/* TOAST */
.toast { 
  position: fixed; bottom: calc(var(--tab-h) + 12px + var(--safe-bottom)); left: 50%; 
  transform: translateX(-50%) translateY(20px);
  background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  z-index: 300; opacity: 0; transition: all 0.3s; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PAGE padding */
.page { padding: 14px 14px calc(14px + var(--safe-bottom)); }
.page-gap { display: flex; flex-direction: column; gap: 12px; }

/* NEXT suggestions */
.next-card {
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 14px; display: flex; gap: 12px; align-items: center; cursor: pointer;
  transition: background 0.15s;
}
.next-card:active { background: var(--card2); }
.next-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
</style>
</head>

// ============================================================
function scoreWeather(code, wind, precip, terrain) {
  if (precip > 8) return 'bad';
  if (terrain === 'alpine' && wind > 40) return 'bad';
  if (terrain === 'alpine' && wind > 25) return 'risky';
  if (terrain === 'exposed' && wind > 50) return 'bad';
  if (precip > 3) return 'risky';
  if ([95,96,99,80,81,82].includes(code)) return 'bad';
  if ([61,63,65,71,73,75,51,53,55].includes(code)) return 'risky';
  return 'good';
}
const weatherIcon = c => {
  if ([0].includes(c)) return '☀️';
  if ([1,2].includes(c)) return '🌤️';
  if ([3].includes(c)) return '☁️';
  if ([45,48].includes(c)) return '🌫️';
  if ([51,53,55,61,63,65].includes(c)) return '🌧️';
  if ([71,73,75,77].includes(c)) return '❄️';
  if ([80,81,82].includes(c)) return '🌦️';
  if ([95,96,99].includes(c)) return '⛈️';
  return '🌡️';
};
const days = ['Nd','Pn','Wt','Śr','Cz','Pt','So'];

async function fetchWeather(peak) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${peak.lat}&longitude=${peak.lon}&daily=weathercode,windspeed_10m_max,precipitation_sum&timezone=Europe%2FWarsaw&forecast_days=7`;
    const r = await fetch(url, {mode:'cors'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    return d.daily;
  } catch(e) {
    // Fallback: symulacja pogody gdy brak internetu lub CORS z file://
    const today = new Date();
    return {
      time: Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()+i);return d.toISOString().split('T')[0]}),
      weathercode: [1,2,3,61,80,1,2],
      windspeed_10m_max: [15,20,35,25,18,12,22],
      precipitation_sum: [0,0.5,8,3,2,0,0.2],
      _offline: true
    };
  }
}

// ============================================================
function startGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    state.userLat = pos.coords.latitude;
    state.userLon = pos.coords.longitude;
    state.gpsActive = true;
    checkGeofence();
  }, null, {enableHighAccuracy:true, maximumAge:10000});
}

function dist(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkGeofence() {
  if (!state.userLat) return;
  for (const p of PEAKS) {
    if (isDone(p.id)) continue;
    const d = dist(state.userLat, state.userLon, p.lat, p.lon);
    if (d < 500) {
      if (state.nearbyPeak !== p.id) {
        state.nearbyPeak = p.id;
        showToast(`📍 Jesteś blisko ${p.name}! Otwórz tryb Szczyt`);
        setTimeout(() => goto('summit'), 2000);
      }
      return;
    }
  }
  state.nearbyPeak = null;
}

function distFromUser(peak) {
  if (!state.userLat) return null;
  return dist(state.userLat, state.userLon, peak.lat, peak.lon);
}

function confetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  const colors = ['#e8a020','#4caf7d','#4a90d9','#e05555','#f0c060','#a0e8d0'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*2}s;transform:rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 5000);
}

function addMinutes(timeStr, mins) {
  const [h,m] = timeStr.split(':').map(Number);
  const total = h*60+m+mins;
  return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}
function fmtTime(min) {
  const h = Math.floor(min/60), m = min%60;
  return h > 0 ? `${h}h ${m>0?m+'min':''}` : `${m} min`;
}
function adjTime(min) { return Math.round(min * state.paceMultiplier); }

// SVG map state
const mapState = { scale:1, tx:0, ty:0, dragging:false, lastX:0, lastY:0, pinchDist:0 };

function latLonToXY(lat, lon, w, h) {
  const x = (lon - MAP_BOUNDS.minLon) / (MAP_BOUNDS.maxLon - MAP_BOUNDS.minLon) * w;
  const y = (1 - (lat - MAP_BOUNDS.minLat) / (MAP_BOUNDS.maxLat - MAP_BOUNDS.minLat)) * h;
  return [x, y];
}

function initMap() {
  const svg = document.getElementById('map-svg');
  if (!svg || svg.dataset.init) return;
  svg.dataset.init = '1';

  const W = svg.clientWidth || window.innerWidth || 400;
  const H = svg.clientHeight || window.innerHeight - 120 || 500;
  const NS = 'http://www.w3.org/2000/svg';

  // Czyść i ustaw wymiary
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  // Defs — gradient tła
  const defs = document.createElementNS(NS, 'defs');
  const grad = document.createElementNS(NS, 'radialGradient');
  grad.setAttribute('id','bgGrad'); grad.setAttribute('cx','50%'); grad.setAttribute('cy','50%'); grad.setAttribute('r','70%');
  const s1 = document.createElementNS(NS, 'stop'); s1.setAttribute('offset','0%'); s1.setAttribute('stop-color','#1a2a1a');
  const s2 = document.createElementNS(NS, 'stop'); s2.setAttribute('offset','100%'); s2.setAttribute('stop-color','#0d1117');
  grad.appendChild(s1); grad.appendChild(s2); defs.appendChild(grad); svg.appendChild(defs);

  // Tło
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H); bg.setAttribute('fill','url(#bgGrad)');
  svg.appendChild(bg);

  // Siatka
  const grid = document.createElementNS(NS, 'g');
  grid.setAttribute('opacity','0.06');
  for (let i=0;i<12;i++){const l=document.createElementNS(NS,'line');l.setAttribute('x1',i*W/11);l.setAttribute('y1',0);l.setAttribute('x2',i*W/11);l.setAttribute('y2',H);l.setAttribute('stroke','#4a90d9');l.setAttribute('stroke-width','0.5');grid.appendChild(l);}
  for (let i=0;i<9;i++){const l=document.createElementNS(NS,'line');l.setAttribute('x1',0);l.setAttribute('y1',i*H/8);l.setAttribute('x2',W);l.setAttribute('y2',i*H/8);l.setAttribute('stroke','#4a90d9');l.setAttribute('stroke-width','0.5');grid.appendChild(l);}
  svg.appendChild(grid);

  // Watermark PL
  const wm = document.createElementNS(NS, 'text');
  wm.setAttribute('x', W/2); wm.setAttribute('y', H*0.55);
  wm.setAttribute('text-anchor','middle'); wm.setAttribute('fill','#ffffff05');
  wm.setAttribute('font-size', W*0.45); wm.setAttribute('font-weight','900');
  wm.textContent = 'PL'; svg.appendChild(wm);

  // Kontener na szczyty
  const content = document.createElementNS(NS, 'g');
  content.setAttribute('id','map-content');
  svg.appendChild(content);

  // Rysuj szczyty
  PEAKS.forEach(p => {
    const [x, y] = latLonToXY(p.lat, p.lon, W, H);
    const done = isDone(p.id);
    const color = done ? '#4caf7d' : '#e8a020';
    const r = done ? 9 : 7;

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${x},${y})`);
    g.style.cursor = 'pointer';

    // Glow ring
    const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
    glow.setAttribute('r', r+4); glow.setAttribute('fill', color+'22');
    g.appendChild(glow);

    // Dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('r', r); dot.setAttribute('fill', color);
    dot.setAttribute('stroke','white'); dot.setAttribute('stroke-width','1.5');
    g.appendChild(dot);

    // Checkmark for done
    if (done) {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size','9'); t.setAttribute('fill','#fff'); t.setAttribute('font-weight','900');
      t.textContent = '✓';
      g.appendChild(t);
    }

    // Label
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('y', r+10); label.setAttribute('text-anchor','middle');
    label.setAttribute('font-size','9'); label.setAttribute('fill',color);
    label.setAttribute('font-family','Inter'); label.setAttribute('font-weight','600');
    label.setAttribute('stroke','#0d1117'); label.setAttribute('stroke-width','2');
    label.setAttribute('paint-order','stroke');
    label.textContent = p.name;
    g.appendChild(label);

    // Tooltip/click
    g.addEventListener('click', e => {
      e.stopPropagation();
      showMapTooltip(p, x, y, W, H);
    });
    g.addEventListener('touchend', e => {
      e.preventDefault(); e.stopPropagation();
      showMapTooltip(p, x, y, W, H);
    });

    content.appendChild(g);
  });

  // User location
  if (state.userLat) {
    const [ux, uy] = latLonToXY(state.userLat, state.userLon, W, H);
    const ug = document.createElementNS('http://www.w3.org/2000/svg','g');
    ug.setAttribute('transform',`translate(${ux},${uy})`);
    ug.id = 'user-dot';
    const uc = document.createElementNS('http://www.w3.org/2000/svg','circle');
    uc.setAttribute('r','8'); uc.setAttribute('fill','#4a90d9');
    uc.setAttribute('stroke','white'); uc.setAttribute('stroke-width','2');
    ug.appendChild(uc);
    content.appendChild(ug);
  }

  setupMapInteraction(svg, content, W, H);
}

function showMapTooltip(p, x, y, W, H) {
  const done = isDone(p.id);
  const tip = document.getElementById('map-tooltip');
  if (!tip) return;
  const color = done ? '#4caf7d' : '#e8a020';
  tip.innerHTML = `
    <div style="font-weight:700;font-size:14px">${p.name}</div>
    <div style="font-size:11px;color:#9090b0">${p.range}</div>
    <div style="font-size:20px;font-weight:700;color:${color};font-family:var(--font-display)">${p.height} m</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button onclick="openPeakDetail(${p.id});document.getElementById('map-tooltip').style.display='none'" style="flex:1;background:${color};border:none;border-radius:8px;padding:6px;font-size:11px;font-weight:700;cursor:pointer;color:${done?'#fff':'#000'}">
        ${done?'✅ Zdobyty':'📋 Szczegóły'}
      </button>
      <button onclick="changePlanPeak(${p.id});goto('plan');document.getElementById('map-tooltip').style.display='none'" style="background:#252545;border:1px solid #2a2a45;border-radius:8px;padding:6px;font-size:11px;cursor:pointer;color:#e8e8f0">
        📅
      </button>
    </div>`;

  // Pozycjonowanie tooltip — nie wychodź poza ekran
  const container = document.getElementById('map-container');
  const cRect = container.getBoundingClientRect();
  const svgRect = document.getElementById('map-svg').getBoundingClientRect();
  const scale = mapState.scale;
  const px = x * scale + mapState.tx + svgRect.left - cRect.left;
  const py = y * scale + mapState.ty + svgRect.top - cRect.top;

  tip.style.display = 'block';
  tip.style.left = Math.min(px - 75, cRect.width - 180) + 'px';
  tip.style.top = (py > 200 ? py - 130 : py + 20) + 'px';
}

function setupMapInteraction(svg, content, W, H) {
  let isDragging = false, startX, startY, startTx, startTy;
  let lastPinch = 0;

  function applyTransform() {
    content.setAttribute('transform', `translate(${mapState.tx},${mapState.ty}) scale(${mapState.scale})`);
  }

  svg.addEventListener('mousedown', e => {
    isDragging = true; startX = e.clientX; startY = e.clientY;
    startTx = mapState.tx; startTy = mapState.ty;
  });
  svg.addEventListener('mousemove', e => {
    if (!isDragging) return;
    mapState.tx = startTx + e.clientX - startX;
    mapState.ty = startTy + e.clientY - startY;
    applyTransform();
  });
  svg.addEventListener('mouseup', () => isDragging = false);
  svg.addEventListener('mouseleave', () => isDragging = false);

  svg.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      startTx = mapState.tx; startTy = mapState.ty;
    } else if (e.touches.length === 2) {
      isDragging = false;
      lastPinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }
    document.getElementById('map-tooltip').style.display = 'none';
  }, {passive:true});

  svg.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      mapState.tx = startTx + e.touches[0].clientX - startX;
      mapState.ty = startTy + e.touches[0].clientY - startY;
      applyTransform();
    } else if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      if (lastPinch) { mapState.scale *= d/lastPinch; mapState.scale = Math.max(0.5, Math.min(5, mapState.scale)); applyTransform(); }
      lastPinch = d;
    }
  }, {passive:true});
  svg.addEventListener('touchend', () => { isDragging = false; lastPinch = 0; });

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    mapState.scale = Math.max(0.5, Math.min(5, mapState.scale * factor));
    applyTransform();
  }, {passive:false});

  svg.addEventListener('click', () => { document.getElementById('map-tooltip').style.display = 'none'; });
}

function mapZoom(factor) {
  const content = document.getElementById('map-content');
  if (!content) return;
  mapState.scale = Math.max(0.5, Math.min(5, mapState.scale * factor));
  content.setAttribute('transform', `translate(${mapState.tx},${mapState.ty}) scale(${mapState.scale})`);
}

function mapReset() {
  mapState.scale = 1; mapState.tx = 0; mapState.ty = 0;
  const content = document.getElementById('map-content');
  if (content) content.setAttribute('transform','');
}

function renderTimeline(peakId, returnHtml=false) {
  const peak = PEAKS.find(p=>p.id==peakId);
  if (!peak) return '';
  const start = state.departTime || '07:00';
  const driveMin = 90; // symulacja
  const walkToTrailMin = 5;
  const upMin = adjTime(peak.trail.up);
  const downMin = adjTime(peak.trail.down);
  const driveBackMin = 90;

  const t1 = start;
  const t2 = addMinutes(t1, driveMin);
  const t3 = addMinutes(t2, walkToTrailMin);
  const t4 = addMinutes(t3, upMin);
  const t5 = addMinutes(t4, 30); // przerwa na szczycie
  const t6 = addMinutes(t5, downMin);
  const t7 = addMinutes(t6, driveBackMin);

  const html = `
  <div class="card card-pad">
    <div class="section-title">⏱️ Kalkulator dnia</div>
    <div class="timeline">
      ${[
        {t:t1, icon:'🏠', bg:'#1e1e35', label:'Wyjazd z domu', detail:''},
        {t:t2, icon:'🅿️', bg:'#1e2535', label:'Parking / Start', detail:`Dojazd ~${fmtTime(driveMin)}`},
        {t:t3, icon:'👟', bg:'#1e2535', label:'Start szlaku', detail:`${walkToTrailMin} min od parkingu`},
        {t:t4, icon:'🏔️', bg:'#1a2e1a', label:`Szczyt — ${peak.name}`, detail:`Podejście wg Twojego tempa: ${fmtTime(upMin)} · ${peak.trail.ascent}m przewyższenia`},
        {t:t5, icon:'📸', bg:'#2a2a1a', label:'Zdjęcie + pieczątka', detail:'Zaplanuj 30 min na szczycie'},
        {t:t6, icon:'🔽', bg:'#1e2535', label:'Zejście do parkingu', detail:`Zejście: ${fmtTime(downMin)}`},
        {t:t7, icon:'🏠', bg:'#1e1e35', label:'Powrót do domu', detail:`Łącznie w trasie: ${fmtTime(driveMin+walkToTrailMin+upMin+30+downMin+driveBackMin)}`}
      ].map((item, i, arr) => `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-dot" style="background:${item.bg}">${item.icon}</div>
            ${i < arr.length-1 ? '<div class="tl-line"></div>' : ''}
          </div>
          <div class="tl-content">
            <div class="tl-time">${item.t}</div>
            <div class="tl-label">${item.label}</div>
            ${item.detail ? `<div class="tl-detail">${item.detail}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>
    <div style="margin-top:12px;padding:10px;background:var(--card2);border-radius:10px;font-size:12px;color:var(--text2)">
      📍 Dystans trasy: <b style="color:var(--text)">${peak.trail.dist} km</b> &nbsp;·&nbsp;
      ↑ <b style="color:var(--text)">${peak.trail.ascent} m</b> przewyższenia
    </div>
  </div>`;

  if (returnHtml) return html;
  const el = document.getElementById('timeline-section');
  if (el) el.innerHTML = html;
}

function renderOptimizer(currentPeak) {
  const todo = getTodo().filter(p => p.id !== currentPeak.id);
  const nearby = todo.filter(p => dist(currentPeak.lat, currentPeak.lon, p.lat, p.lon) < 80000)
    .sort((a,b) => dist(currentPeak.lat,currentPeak.lon,a.lat,a.lon) - dist(currentPeak.lat,currentPeak.lon,b.lat,b.lon))
    .slice(0,3);

  if (nearby.length === 0) return `<div style="color:var(--text2);font-size:13px">Brak pobliskich niezdobytych szczytów w promieniu 80km 🎉</div>`;

  return `<div style="font-size:12px;color:var(--text2);margin-bottom:10px">Możesz połączyć z ${currentPeak.name} w jeden wyjazd:</div>
  ${nearby.map(p => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${p.name}</div>

}

        📷 Zrób zdjęcie szczytowe
      </button>
      <div id="photo-preview" style="margin-top:10px;display:none">
        <img id="photo-img" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover">
        <div style="font-size:11px;color:var(--green);margin-top:6px;text-align:center">✅ Zdjęcie zapisane</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="photoSelected(this,${peak.id})">
    </div>

    <div class="card card-pad">
      <div class="label" style="margin-bottom:8px">Notatka ze szczytu</div>
      <textarea class="input" id="summit-note" rows="3" placeholder="Pogoda, widoki, towarzysze..." style="resize:none;line-height:1.5"></textarea>
    </div>

    <button class="btn btn-green btn-full" id="conquer-btn" onclick="conquerPeak(${peak.id})" disabled>
      ✅ Oznacz jako zdobyty
    </button>
    <div style="font-size:11px;color:var(--text2);text-align:center;margin-top:-6px">Zrób najpierw zdjęcie aby aktywować</div>

    <button class="btn btn-secondary btn-full" onclick="returnToParking(${peak.id})">
      🧭 Wróć do parkingu
    </button>

  </div>`;
}

function changeSummitPeak(id) {
  state.selectedPeak = PEAKS.find(p=>p.id==id);
  goto('summit');
}
function takePhoto() { document.getElementById('photo-input').click(); }
function photoSelected(input, peakId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('photo-img');
    img.src = e.target.result;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('conquer-btn').disabled = false;
    document.getElementById('photo-btn').textContent = '📷 Zmień zdjęcie';
    state.pendingPhoto = e.target.result;
    state.pendingPeakId = peakId;
    showToast('✅ Zdjęcie gotowe!');
  };
  reader.readAsDataURL(file);
}
function conquerPeak(peakId) {
  if (state.conquered.includes(peakId)) return;
  const note = document.getElementById('summit-note')?.value || '';
  const peak = PEAKS.find(p=>p.id===peakId);
  state.conquered.push(peakId);
  const entry = {
    peakId, name: peak.name, height: peak.height, range: peak.range,
    date: new Date().toLocaleDateString('pl-PL'),
    time: new Date().toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'}),
    note, photo: state.pendingPhoto || null
  };
  state.journal.unshift(entry);
  save();
  confetti();
  showToast(`🎉 ${peak.name} zdobyta! ${state.conquered.length}/28`);
  setTimeout(() => {
    state.pendingPhoto = null;
    goto('next_suggest');
  }, 2000);
}
function openMaps(lat, lon) {
  window.open(`https://maps.google.com?q=${lat},${lon}`, '_blank');
}
function returnToParking(peakId) {
  const p = PEAKS.find(pk=>pk.id===peakId);
  if (p.parking[0]) {
    const pk = p.parking[0];
    window.open(`https://maps.google.com?q=${pk.name}&near=${p.lat},${p.lon}`, '_blank');
  }
}

// JOURNAL PAGE
function renderJournal() {
  const done = state.conquered.length;
  const totalAscent = state.journal.reduce((sum,e)=>{
    const p=PEAKS.find(pk=>pk.id===e.peakId); return sum+(p?p.trail.ascent:0);
  }, 0);
  const everests = (totalAscent / 8849 * 100).toFixed(0);

  return `
  <div class="header">
    <span class="header-icon">📖</span>
    <div><div class="header-title">Dziennik</div><div class="header-sub">${done} szczytów zdobytych</div></div>
  </div>
  <div class="page page-gap" style="padding-bottom:80px">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${done}</div>
        <div class="stat-label">Szczytów zdobytych</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${28-done}</div>
        <div class="stat-label">Pozostało</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalAscent.toLocaleString()}</div>
        <div class="stat-label">Metrów w górę</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${everests}%</div>
        <div class="stat-label">Everestu (8849m)</div>
      </div>
    </div>

    ${done > 0 ? `
    <div style="background:linear-gradient(135deg,#1a2a1a,#0f1a0f);border:1px solid ${done===28?'var(--accent)':'var(--green)'}44;border-radius:var(--radius);padding:14px;text-align:center">
      ${done === 28 
        ? `<div style="font-family:var(--font-display);font-size:28px;color:var(--accent)">🏆 ZDOBYWCA KORONY!</div><div style="font-size:13px;color:var(--text2)">Wszystkie 28 szczytów zdobyte!</div>`
        : `<div style="font-size:13px;color:var(--text2)">Do tytułu Zdobywcy brakuje Ci</div><div style="font-family:var(--font-display);font-size:36px;color:var(--green)">${28-done} szczytów</div>`}
    </div>` : ''}

    ${state.journal.length > 0 ? `
    <div class="card">
      <div class="card-pad" style="border-bottom:1px solid var(--border)"><div class="section-title">Historia</div></div>
      ${state.journal.map(entry => `
        <div class="journal-item">
          <div class="journal-photo">
            ${entry.photo ? `<img src="${entry.photo}" alt="szczyt">` : '📷'}
          </div>
          <div class="journal-info">
            <div class="journal-name">${entry.name} <span style="color:var(--accent);font-family:var(--font-display);font-size:16px">${entry.height}m</span></div>
            <div class="journal-date">📅 ${entry.date} o ${entry.time}</div>
            ${entry.note ? `<div class="journal-note">"${entry.note}"</div>` : ''}
          </div>
          <button onclick="removePeak(${entry.peakId})" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px" title="Usuń">×</button>
        </div>`).join('')}
    </div>` : `
    <div style="text-align:center;padding:40px;color:var(--text2)">
      <div style="font-size:48px;margin-bottom:12px">⛰️</div>
      <div style="font-size:14px">Brak wpisów w dzienniku</div>
      <div style="font-size:12px;margin-top:6px">Zdobądź pierwszy szczyt!</div>
    </div>`}

    ${done > 0 ? `
    <div class="card card-pad">
      <div class="section-title">🤔 Co dalej?</div>
      ${renderNextSuggestions()}
    </div>` : ''}

  </div>`;
}

function removePeak(peakId) {
  if (!confirm('Usunąć wpis?')) return;
  state.conquered = state.conquered.filter(id=>id!==peakId);
  state.journal = state.journal.filter(e=>e.peakId!==peakId);
  save();
  goto('journal');
}

// NEXT SUGGESTIONS
function renderNextSuggestions() {
  const todo = getTodo();
  if (todo.length === 0) return '<div style="color:var(--green);font-weight:600">🏆 Wszystkie szczyty zdobyte!</div>';

  const byDist = state.userLat ? [...todo].sort((a,b)=>dist(state.userLat,state.userLon,a.lat,a.lon)-dist(state.userLat,state.userLon,b.lat,b.lon)) : todo;
  const nearest = byDist[0];
  const easiest = [...todo].sort((a,b)=>a.difficulty-b.difficulty)[0];
  const month = new Date().getMonth()+1;
  const seasonal = todo.find(p=>p.season.includes(month)) || todo[0];

  const card = (emoji, tag, color, p, desc) => `
    <div class="next-card" onclick="changePlanPeak(${p.id});goto('plan')" style="margin-bottom:8px">
      <div style="font-size:28px">${emoji}</div>
      <div style="flex:1">
        <div class="next-tag" style="color:${color}">${tag}</div>
        <div style="font-weight:700;font-size:14px">${p.name} <span style="color:var(--accent)">${p.height}m</span></div>
        <div style="font-size:11px;color:var(--text2)">${desc}</div>
      </div>
      <div style="color:var(--text2)">›</div>
    </div>`;

  return card('📍','NAJBLIŻSZY','var(--blue)',nearest,
    state.userLat ? `${Math.round(dist(state.userLat,state.userLon,nearest.lat,nearest.lon)/1000)} km od Ciebie · ${nearest.range}` : nearest.range) +
  card('😊','NAJŁATWIEJSZY','var(--green)',easiest,
    `Trudność ${easiest.difficulty}/5 · ${easiest.range}`) +
  card('🌡️','SEZONOWY','var(--accent)',seasonal,
    `Polecany na ${new Date().toLocaleString('pl',{month:'long'})} · ${seasonal.range}`);
}

function renderNextSuggestPage() {
  const lastId = state.conquered[state.conquered.length-1];
  const last = PEAKS.find(p=>p.id===lastId);
  return `
  <div class="header">
    <span class="header-icon">🎉</span>
    <div><div class="header-title">Brawo!</div><div class="header-sub">${state.conquered.length}/28 zdobytych</div></div>
  </div>
  <div class="page page-gap" style="padding-bottom:80px">
    <div style="text-align:center;padding:20px">
      <div style="font-size:64px">🏔️</div>
      <div style="font-family:var(--font-display);font-size:32px;color:var(--green);margin-top:8px">${last?.name} ZDOBYTA!</div>
      <div style="font-size:14px;color:var(--text2);margin-top:4px">${state.conquered.length} z 28 szczytów Korony</div>
    </div>
    <div class="card card-pad">
      <div class="section-title">Co dalej?</div>
      ${renderNextSuggestions()}
    </div>
    <button class="btn btn-secondary btn-full" onclick="goto('journal')">📖 Zobacz dziennik</button>
  </div>`;
}

// PEAK DETAIL MODAL
function openPeakDetail(id) {
  const p = PEAKS.find(pk=>pk.id==id);
  const done = isDone(id);
  const journal = state.journal.find(e=>e.peakId===id);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div>
          <div style="font-family:var(--font-display);font-size:28px;color:${done?'var(--green)':'var(--accent)'};letter-spacing:1px">${p.name}</div>
          <div style="font-size:13px;color:var(--text2)">${p.range} ${done?'· ✅ Zdobyty':''}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-family:var(--font-display);font-size:32px;color:var(--accent)">${p.height}m</div>
          <div style="font-size:11px;color:var(--text2)">n.p.m.</div>
        </div>
      </div>
    </div>
    <div class="page page-gap" style="padding-top:14px">
      ${journal?.photo ? `<img src="${journal.photo}" style="width:100%;border-radius:12px;max-height:180px;object-fit:cover">` : ''}
      ${journal ? `<div style="background:var(--card2);border-radius:10px;padding:12px;font-size:13px"><b>📅 ${journal.date}</b>${journal.note?`<br><i>"${journal.note}"</i>`:''}</div>` : ''}

      <div class="card card-pad">
        <div class="section-title">Szlak główny</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          ${[['📏',p.trail.dist+'km','Dystans'],['↑',p.trail.ascent+'m','Przewyższenie'],['⏱️',fmtTime(adjTime(p.trail.up)),'Podejście']].map(([i,v,l])=>`
          <div style="text-align:center;background:var(--card2);border-radius:8px;padding:8px">
            <div style="font-size:16px">${i}</div>
            <div style="font-family:var(--font-display);font-size:18px;color:var(--accent)">${v}</div>
            <div style="font-size:9px;color:var(--text2)">${l}</div>
          </div>`).join('')}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-primary" onclick="changePlanPeak(${p.id});document.querySelector('.modal-overlay')?.remove();goto('plan')">📅 Planuj wyjazd</button>
        <button class="btn btn-secondary" onclick="changeSummitPeak(${p.id});document.querySelector('.modal-overlay')?.remove();goto('summit')">${done?'👁️ Szczegóły':'🏔️ Tryb szczyt'}</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

// ============================================================
// ROUTER
// ============================================================
const navMap = {map:'nav-map',list:'nav-list',plan:'nav-plan',summit:'nav-summit',journal:'nav-journal'};

async function goto(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navId = navMap[page] || navMap[page.replace('_suggest','')];
  if (navId) document.getElementById(navId)?.classList.add('active');

  const screen = document.getElementById('screen');
  let html = '';

  switch(page) {
    case 'map':    html = renderMap(); break;
    case 'list':   html = renderList(); break;
    case 'plan':   html = await renderPlan(); break;
    case 'summit': html = renderSummit(); break;
    case 'journal':html = renderJournal(); break;
    case 'next_suggest': html = renderNextSuggestPage(); break;
  }

  screen.innerHTML = html;
  screen.scrollTop = 0;

  if (page === 'map') {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        mapState.scale = 1; mapState.tx = 0; mapState.ty = 0;
        const svg = document.getElementById('map-svg');
        if (svg) delete svg.dataset.init;
        initMap();
      });
    });
  }
  if (page === 'plan') {
    const peak = state.selectedPeak || getTodo()[0] || PEAKS[0];
    loadWeather(peak);
  }
}

// ============================================================
// INIT
// ============================================================
window.openPeakDetail = openPeakDetail;
window.goto = goto;

document.addEventListener('DOMContentLoaded', () => {
  startGPS();
  goto('map');
});
</script>
</body>
</html>
