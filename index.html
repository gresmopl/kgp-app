<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="description" content="Asystent zdobywcy Korony Gór Polski - planowanie, GPS, pogoda, dziennik">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
<title>Korona Gór Polski</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goto('map')" id="nav-map">
      <span class="nav-icon">🗺️</span><span>Mapa</span>
    </button>
    <button class="nav-btn" onclick="goto('list')" id="nav-list">
      <span class="nav-icon">🏞️</span><span>Szczyty</span>
    </button>
    <button class="nav-btn" onclick="goto('plan')" id="nav-plan">
      <span class="nav-icon">📅</span><span>Planuj</span>
    </button>
    <button class="nav-btn" onclick="goto('summit')" id="nav-summit">
      <span class="nav-icon">🏔️</span><span>Szczyt</span>
    </button>
    <button class="nav-btn" onclick="goto('journal')" id="nav-journal">
      <span class="nav-icon">📖</span><span>Dziennik</span>
    </button>
    <button class="nav-btn" onclick="goto('settings')" id="nav-settings">
      <span class="nav-icon">⚙️</span><span>Ustawienia</span>
    </button>
    <button class="nav-btn" onclick="goto('sos')" id="nav-sos">
      <span class="nav-icon">🆘</span><span>SOS</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<!-- JS: kolejność ładowania ma znaczenie (zależności) -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/sync.js"></script>
<script src="js/weather.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/journal.js"></script>
<script src="js/settings.js"></script>
<script src="js/features.js"></script>
<script src="js/features2.js"></script>
<script src="js/planner.js"></script>
<script src="js/router.js"></script>
</body>
</html>
