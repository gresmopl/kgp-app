<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="description" content="Asystent zdobywcy Korony Gór Polski - planowanie, GPS, pogoda, dziennik">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<title>Korona Gór Polski</title>
<script>
(function(){
  var t = localStorage.getItem('kgp_theme') || 'system';
  if (t === 'light' || (t === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches))
    document.documentElement.classList.add('light-theme');
  else if (t === 'dark')
    document.documentElement.classList.add('dark-theme');
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goto('map')" id="nav-map" aria-label="Mapa">
      <span class="nav-icon" aria-hidden="true">🗺️</span><span>Mapa</span>
    </button>
    <button class="nav-btn" onclick="goto('list')" id="nav-list" aria-label="Szczyty">
      <span class="nav-icon" aria-hidden="true">🏞️</span><span>Szczyty</span>
    </button>
    <button class="nav-btn" onclick="goto('plan')" id="nav-plan" aria-label="Planuj">
      <span class="nav-icon" aria-hidden="true">🎒</span><span>Planuj</span>
    </button>
    <button class="nav-btn" onclick="goto('summit')" id="nav-summit" aria-label="Zdobywaj">
      <span class="nav-icon" aria-hidden="true">🏔️</span><span>Zdobywaj</span>
    </button>
    <button class="nav-btn" onclick="goto('journal')" id="nav-journal" aria-label="Dziennik">
      <span class="nav-icon" aria-hidden="true">📖</span><span>Dziennik</span>
    </button>
    <button class="nav-btn" onclick="goto('settings')" id="nav-settings" aria-label="Ustawienia">
      <span class="nav-icon" aria-hidden="true">⚙️</span><span>Ustawienia</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<!-- JS: kolejność ładowania ma znaczenie (zależności) -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/sync.js"></script>
<script src="js/ai.js"></script>
<script src="js/weather.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/journal.js"></script>
<script src="js/settings.js"></script>
<script src="js/features.js"></script>
<script src="js/features2.js"></script>
<script src="js/planner.js"></script>
<script src="js/router.js"></script>
</body>
</html>
